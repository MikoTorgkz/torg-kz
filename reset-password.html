<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сброс пароля - Torg.kz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

h1 {
    text-align: center;
    color: #0B2341;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border: 1px solid #ddd;
    border-radius: 12px;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #E53935;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.message {
    margin-top: 15px;
    text-align: center;
}
</style>
</head>
<body>

<div class="card">
    <h1>Новый пароль</h1>

    <input
        type="password"
        id="password"
        placeholder="Введите новый пароль"
    >

    <button onclick="resetPassword()">
        Сохранить пароль
    </button>

    <div class="message" id="message"></div>
</div>

<script>
async function resetPassword() {

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const password =
        document.getElementById('password').value;

    const message =
        document.getElementById('message');

    try {

        const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                token,
                newPassword: password
            })
        });

        const data = await response.json();

        if(response.ok) {
            message.style.color = 'green';
            message.innerText =
                'Пароль успешно изменён';
        } else {
            message.style.color = 'red';
            message.innerText =
                data.message || 'Ошибка';
        }

    } catch(err) {
        message.style.color = 'red';
        message.innerText = 'Ошибка соединения';
    }
}
</script>

</body>
</html>
